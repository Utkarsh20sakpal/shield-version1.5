services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: shield-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this manually in Render dashboard — your Atlas URI
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CLIENT_ORIGIN
        sync: false          # Set to your Render static site URL after deploying client
      - key: EMAIL_USER
        sync: false          # Your Gmail/SMTP address
      - key: EMAIL_PASS
        sync: false          # Your Gmail app password
    healthCheckPath: /health

  # ── Frontend (Vite React — deployed as Static Site) ──────────────────────────
  - type: static
    name: shield-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your server URL, e.g. https://shield-server.onrender.com/api
      - key: VITE_SOCKET_URL
        sync: false          # Set to your server URL, e.g. https://shield-server.onrender.com
      # Firebase Configuration
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyB6zE8Du0p92DsRF5VYO1ZA8_1UlDIKOwo
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: predictive-maintenance-m.firebaseapp.com
      - key: VITE_FIREBASE_DATABASE_URL
        value: https://predictive-maintenance-m-default-rtdb.firebaseio.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: predictive-maintenance-m
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: predictive-maintenance-m.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: 1066717570544
      - key: VITE_FIREBASE_APP_ID
        value: 1:1066717570544:web:5d7261d0c62dcdee13a935
    routes:
      # SPA fallback — send all routes to index.html so React Router works
      - type: rewrite
        source: /*
        destination: /index.html
